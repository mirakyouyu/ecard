<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>E カード</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      --bg:      #0d0d0d;
      --surface: #1a1a1a;
      --border:  #2a2a2a;
      --gold:    #c9a84c;
      --red:     #c0392b;
      --green:   #27ae60;
      --blue:    #7799cc;
      --text:    #f0f0f0;
      --muted:   #666;
    }
    body {
      font-family: -apple-system, 'Helvetica Neue', 'Hiragino Kaku Gothic ProN', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; justify-content: center;
    }
    #app { width: 100%; max-width: 480px; min-height: 100vh; }

    .screen { display: none; padding: 24px 20px; min-height: 100vh; flex-direction: column; }
    .screen.active { display: flex; }

    .title-text {
      font-size: 56px; font-weight: 900; text-align: center;
      letter-spacing: 12px; color: var(--gold);
      text-shadow: 0 0 40px rgba(201,168,76,0.35);
    }
    .subtitle { color: var(--muted); font-size: 13px; text-align: center; margin-top: 6px; letter-spacing: 2px; }

    .btn {
      display: block; width: 100%; padding: 16px; border: none; border-radius: 6px;
      font-size: 17px; font-weight: 700; cursor: pointer; margin: 8px 0;
      transition: opacity 0.15s; text-align: center; letter-spacing: 1px;
    }
    .btn:active { opacity: 0.65; }
    .btn-gold  { background: var(--gold); color: #000; }
    .btn-dark  { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
    .btn-sm    { padding: 10px 24px; font-size: 14px; width: auto; display: inline-block; }
    .btn:disabled { opacity: 0.4; cursor: default; }

    .code-input {
      display: block; width: 100%; padding: 16px;
      background: var(--surface); border: 2px solid var(--border); border-radius: 6px;
      color: var(--text); font-size: 36px; text-align: center;
      letter-spacing: 16px; margin: 8px 0; outline: none;
    }
    .code-input:focus { border-color: var(--gold); }

    .room-code-display {
      font-size: 60px; font-weight: 900; text-align: center;
      letter-spacing: 18px; color: var(--gold);
      padding: 24px; border: 2px solid var(--gold); border-radius: 10px;
      margin: 16px 0; cursor: pointer;
    }
    .copy-hint { font-size: 12px; color: var(--muted); text-align: center; margin-top: -8px; }

    .card {
      width: 74px; height: 110px; border-radius: 10px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
      border: 2px solid transparent; user-select: none; flex-shrink: 0;
    }
    .card-symbol { font-size: 30px; line-height: 1; }
    .card-name   { font-size: 11px; font-weight: 700; margin-top: 6px; letter-spacing: 1px; }
    .card-emperor { background: linear-gradient(145deg, #3d2b00, #7a5c10); color: var(--gold); }
    .card-slave   { background: linear-gradient(145deg, #1a1a30, #2a2a50); color: #9999cc; }
    .card-citizen { background: linear-gradient(145deg, #1e1e1e, #2c2c2c); color: #aaa; }
    .card-back    {
      background: repeating-linear-gradient(135deg, #162218 0px, #162218 7px, #1d2f20 7px, #1d2f20 14px);
      border-color: #2a4030;
    }
    .card.selected  { transform: translateY(-18px) !important; border-color: var(--gold) !important; box-shadow: 0 14px 32px rgba(201,168,76,0.45); }
    .card.submitted { opacity: 0.45; cursor: default; pointer-events: none; }
    .card.disabled  { cursor: default; pointer-events: none; }
    .card-lg { width: 100px; height: 148px; }
    .card-lg .card-symbol { font-size: 40px; }
    .card-lg .card-name   { font-size: 14px; margin-top: 10px; }

    .hand { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; padding: 8px 0; }

    .score-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px; background: var(--surface); border-radius: 8px;
    }
    .score-player { text-align: center; min-width: 90px; }
    .score-name   { font-size: 11px; color: var(--muted); }
    .score-num    { font-size: 46px; font-weight: 900; line-height: 1.1; }
    .score-vs     { font-size: 13px; color: var(--muted); text-align: center; line-height: 1.7; }
    .num-gold { color: var(--gold); }
    .num-blue { color: var(--blue); }

    .role-badge { padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; }
    .badge-emperor { background: rgba(201,168,76,0.15); color: var(--gold);  border: 1px solid rgba(201,168,76,0.4); }
    .badge-slave   { background: rgba(100,100,200,0.15); color: var(--blue); border: 1px solid rgba(100,100,200,0.35); }

    .status-msg { text-align: center; color: var(--muted); font-size: 13px; padding: 10px 0; }

    .game-header {
      display: flex; align-items: center; justify-content: space-between;
      padding-bottom: 12px; border-bottom: 1px solid var(--border);
    }
    .game-title { font-size: 20px; font-weight: 900; color: var(--gold); letter-spacing: 5px; }
    .opp-area   { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; }
    .area-label { font-size: 12px; color: var(--muted); }
    .divider    { height: 1px; background: var(--border); margin: 12px 0; }

    .rule-table { width: 100%; border-collapse: collapse; font-size: 13px; margin: 12px 0; }
    .rule-table th, .rule-table td { padding: 8px 10px; border: 1px solid var(--border); text-align: center; }
    .rule-table th { background: var(--surface); color: var(--muted); font-weight: 600; }
    .win-cell  { color: var(--green); font-weight: 700; }
    .lose-cell { color: var(--red);   font-weight: 700; }
    .draw-cell { color: var(--muted); }

    .vs-row  { display: flex; align-items: flex-start; justify-content: center; gap: 20px; }
    .vs-card { text-align: center; }
    .vs-label { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
    .vs-sep  { font-size: 28px; color: var(--muted); font-weight: 900; margin-top: 44px; }
    .result-label { font-size: 30px; font-weight: 900; text-align: center; }
    .result-win  { color: var(--green); }
    .result-lose { color: var(--red);   }
    .result-draw { color: var(--muted); }

    @keyframes pulse  { 0%,100%{opacity:1}  50%{opacity:0.4} }
    .pulse { animation: pulse 1.6s infinite; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
    .fade-up { animation: fadeUp 0.4s ease; }
    @keyframes popIn  { 0%{transform:scale(0.5);opacity:0} 80%{transform:scale(1.08)} 100%{transform:scale(1);opacity:1} }
    .pop-in { animation: popIn 0.5s ease forwards; }

    #toast {
      position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(80px);
      background: #333; color: #fff; padding: 10px 20px; border-radius: 24px;
      font-size: 14px; transition: transform 0.3s; pointer-events: none;
      white-space: nowrap; z-index: 999;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }

    .spacer { flex: 1; }
    .mt8  { margin-top: 8px; }
    .mt16 { margin-top: 16px; }
    .center { text-align: center; }
  </style>
</head>
<body>
<div id="app">

  <!-- ── HOME ── -->
  <div id="screen-home" class="screen active">
    <div class="spacer"></div>
    <div class="title-text">E カード</div>
    <div class="subtitle">カイジ ― 限定Eカード</div>
    <div style="height:32px;"></div>
    <table class="rule-table">
      <tr><th>皇帝側</th><th>vs</th><th>奴隷側</th><th>結果</th></tr>
      <tr><td>👑 皇帝</td><td>vs</td><td>人 市民</td><td class="win-cell">皇帝側 勝ち</td></tr>
      <tr><td>人 市民</td><td>vs</td><td>⛓️ 奴隷</td><td class="win-cell">皇帝側 勝ち</td></tr>
      <tr><td>👑 皇帝</td><td>vs</td><td>⛓️ 奴隷</td><td class="lose-cell">奴隷側 勝ち</td></tr>
      <tr><td>人 市民</td><td>vs</td><td>人 市民</td><td class="draw-cell">引き分け</td></tr>
    </table>
    <div style="font-size:12px; color:var(--muted); text-align:center; margin-bottom:4px;">
      皇帝 &gt; 市民 &gt; 奴隷 &gt; 皇帝（三すくみ）
    </div>
    <div style="font-size:12px; color:var(--muted); text-align:center; margin-bottom:24px;">
      各5枚 ｜ 5ラウンド制・勝ち数の多い方が勝ち
    </div>
    <button class="btn btn-gold" onclick="createRoom()">部屋を作る（ホスト）</button>
    <button class="btn btn-dark" id="join-toggle-btn" onclick="showJoinSection()">部屋に入る（ゲスト）</button>
    <div id="join-section" style="display:none;">
      <input class="code-input" id="join-input" type="tel" placeholder="0000" maxlength="4"
             oninput="this.value=this.value.replace(/\D/g,'')">
      <button class="btn btn-gold" onclick="joinRoom()">入る</button>
      <button class="btn btn-dark" onclick="hideJoinSection()">キャンセル</button>
    </div>
    <div class="spacer"></div>
  </div>

  <!-- ── LOBBY ── -->
  <div id="screen-lobby" class="screen">
    <div class="spacer"></div>
    <div class="center" style="color:var(--muted); font-size:14px; margin-bottom:8px;">
      ルームコードを友達に教えてください
    </div>
    <div class="room-code-display" id="lobby-code" onclick="copyCode()">----</div>
    <div class="copy-hint">タップでコピー</div>
    <div style="height:24px;"></div>
    <div class="status-msg pulse" id="lobby-status">友達を待っています…</div>
    <div class="spacer"></div>
    <button class="btn btn-dark btn-sm" style="align-self:center;" onclick="goHome()">キャンセル</button>
    <div style="height:24px;"></div>
  </div>

  <!-- ── GAME ── -->
  <div id="screen-game" class="screen" style="padding:14px 16px;">
    <div class="game-header">
      <div class="game-title">E カード</div>
      <div id="game-role-badge"></div>
    </div>
    <div style="height:10px;"></div>
    <div class="score-row">
      <div class="score-player">
        <div class="score-name" id="score-p1-name">皇帝側</div>
        <div class="score-num num-gold" id="score-p1-num">0</div>
      </div>
      <div class="score-vs" id="round-counter">1/<br>5R</div>
      <div class="score-player">
        <div class="score-name" id="score-p2-name">奴隷側</div>
        <div class="score-num num-blue" id="score-p2-num">0</div>
      </div>
    </div>
    <div class="status-msg" id="game-status-msg">カードを選んでください</div>
    <div class="opp-area">
      <div class="area-label">相手の手札</div>
      <div class="hand" id="opp-hand"></div>
      <div id="opp-submitted-msg" style="display:none; font-size:12px; color:#444;">カードを出しました ✓</div>
    </div>
    <div class="divider"></div>
    <div>
      <div class="area-label center">あなたの手札</div>
      <div class="hand mt8" id="my-hand"></div>
      <button class="btn btn-gold mt16" id="submit-btn" style="display:none;" onclick="submitCard()">
        このカードを出す
      </button>
    </div>
  </div>

  <!-- ── REVEAL ── -->
  <div id="screen-reveal" class="screen">
    <div class="spacer"></div>
    <div class="fade-up" style="display:flex; flex-direction:column; align-items:center; gap:28px;">
      <div style="font-size:15px; color:var(--muted); letter-spacing:4px;">公　開</div>
      <div class="vs-row">
        <div class="vs-card">
          <div class="vs-label" id="reveal-p1-name">皇帝側</div>
          <div class="card card-lg" id="reveal-p1-card"></div>
        </div>
        <div class="vs-sep">VS</div>
        <div class="vs-card">
          <div class="vs-label" id="reveal-p2-name">奴隷側</div>
          <div class="card card-lg" id="reveal-p2-card"></div>
        </div>
      </div>
      <div class="result-label" id="reveal-result" style="opacity:0; min-height:40px;"></div>
      <div style="color:var(--muted); font-size:13px;" id="reveal-next-msg"></div>
    </div>
    <div class="spacer"></div>
  </div>

  <!-- ── GAME OVER ── -->
  <div id="screen-gameover" class="screen">
    <div class="spacer"></div>
    <div class="fade-up" style="display:flex; flex-direction:column; align-items:center; gap:20px;">
      <div style="font-size:88px;" id="go-emoji"></div>
      <div style="font-size:38px; font-weight:900;" id="go-text"></div>
      <div style="color:var(--muted); font-size:16px;" id="go-score"></div>
    </div>
    <div style="height:40px;"></div>
    <button class="btn btn-gold" id="again-btn" onclick="onPlayAgain()">もう一度</button>
    <button class="btn btn-dark" onclick="goHome()">ホームへ</button>
    <div class="spacer"></div>
  </div>

</div>
<div id="toast"></div>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script>
// ══════════════════════════════════════════════
//  定数
// ══════════════════════════════════════════════
const EMPEROR_HAND = ['emperor','citizen','citizen','citizen','citizen'];
const SLAVE_HAND   = ['slave',  'citizen','citizen','citizen','citizen'];
const TOTAL_ROUNDS = 5;
const CARD = {
  emperor: { name: '皇帝', symbol: '👑', cls: 'card-emperor' },
  slave:   { name: '奴隷', symbol: '⛓️', cls: 'card-slave'   },
  citizen: { name: '市民', symbol: '人',  cls: 'card-citizen' },
};

// ══════════════════════════════════════════════
//  状態
// ══════════════════════════════════════════════
let peer     = null;
let conn     = null;
let myRole   = null;   // 'p1' | 'p2'
let selIdx   = null;

// ゲーム状態（P1が管理、P2はコピーを受け取るだけ）
let gs = null;

function freshState() {
  return {
    status:  'playing',
    p1hand:  [...EMPEROR_HAND],
    p2hand:  [...SLAVE_HAND],
    p1card:  null,
    p2card:  null,
    score:   { p1: 0, p2: 0 },
    round:   1,
    winner:  null,
  };
}

// ══════════════════════════════════════════════
//  ユーティリティ
// ══════════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
}
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 2200);
}
// 三すくみ: 皇帝 > 市民 > 奴隷 > 皇帝
// p1 = 皇帝側, p2 = 奴隷側
function getResult(p1c, p2c) {
  if (p1c === 'emperor' && p2c === 'citizen') return 'p1'; // 皇帝 > 市民
  if (p1c === 'citizen' && p2c === 'slave')   return 'p1'; // 市民 > 奴隷
  if (p1c === 'emperor' && p2c === 'slave')   return 'p2'; // 奴隷 > 皇帝
  return 'draw'; // 市民 vs 市民
}
function send(msg) {
  if (conn && conn.open) conn.send(msg);
}

// ══════════════════════════════════════════════
//  ホーム
// ══════════════════════════════════════════════
function showJoinSection() {
  document.getElementById('join-section').style.display = 'block';
  document.getElementById('join-toggle-btn').style.display = 'none';
}
function hideJoinSection() {
  document.getElementById('join-section').style.display = 'none';
  document.getElementById('join-toggle-btn').style.display = 'block';
}

function goHome() {
  if (conn)  { conn.close();  conn  = null; }
  if (peer)  { peer.destroy(); peer = null; }
  myRole = null; selIdx = null; gs = null;
  showScreen('home');
}

function copyCode() {
  const code = document.getElementById('lobby-code').textContent;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(code).then(() => toast('コピーしました！'));
  } else {
    toast(code);
  }
}

// ══════════════════════════════════════════════
//  部屋を作る（P1 = ホスト）
// ══════════════════════════════════════════════
function createRoom() {
  const roomId = String(Math.floor(1000 + Math.random() * 9000));
  myRole = 'p1';

  peer = new Peer(roomId);

  peer.on('open', (id) => {
    document.getElementById('lobby-code').textContent = id;
    showScreen('lobby');
  });

  peer.on('connection', (c) => {
    conn = c;
    conn.on('open', () => {
      // P2 が繋がったのでゲーム開始
      gs = freshState();
      selIdx = null;
      broadcastState();
      render();
    });
    conn.on('data', (msg) => onP2Message(msg));
    conn.on('close', () => toast('相手が切断しました'));
  });

  peer.on('error', (err) => {
    if (err.type === 'unavailable-id') {
      toast('このコードは使用中です。もう一度お試しください');
      peer.destroy(); peer = null;
      showScreen('home');
    } else {
      toast('接続エラー: ' + err.type);
    }
  });
}

// ══════════════════════════════════════════════
//  部屋に入る（P2 = ゲスト）
// ══════════════════════════════════════════════
function joinRoom() {
  const code = document.getElementById('join-input').value.trim();
  if (code.length !== 4) { toast('4桁のコードを入力してください'); return; }

  myRole = 'p2';

  // P2 は自分の Peer ID はランダムでOK
  peer = new Peer();
  peer.on('open', () => {
    conn = peer.connect(code, { reliable: true, serialization: 'json' });

    conn.on('open', () => {
      document.getElementById('lobby-code').textContent = code;
      document.getElementById('lobby-status').textContent = '接続しました！';
      showScreen('lobby');
    });
    conn.on('data',  (msg) => onP1Message(msg));
    conn.on('close', () => toast('ホストが切断しました'));
    conn.on('error', () => toast('接続に失敗しました'));
  });

  peer.on('error', (err) => {
    toast('部屋が見つかりません');
  });
}

// ══════════════════════════════════════════════
//  メッセージ受信
// ══════════════════════════════════════════════

// P1 → P2 へのメッセージを P2 が受け取る
function onP1Message(msg) {
  if (msg.type === 'state') {
    gs = msg.data;
    selIdx = null;
    render();
  }
}

// P2 → P1 へのメッセージを P1 が受け取る
function onP2Message(msg) {
  if (!gs) return;

  if (msg.type === 'card') {
    // P2 がカードを出した
    if (gs.p2card !== null) return;
    const hand = [...gs.p2hand];
    gs.p2card = hand[msg.idx];
    hand.splice(msg.idx, 1);
    gs.p2hand = hand;
    checkBothReady();
    broadcastState();
    render();
  }

  if (msg.type === 'playAgain') {
    resetGame();
  }
}

// ══════════════════════════════════════════════
//  ゲームロジック（P1 のみ実行）
// ══════════════════════════════════════════════
function broadcastState() {
  send({ type: 'state', data: gs });
}

function checkBothReady() {
  if (gs.p1card && gs.p2card && gs.status === 'playing') {
    gs.status = 'revealing';
    broadcastState();
    render();

    setTimeout(() => {
      const result = getResult(gs.p1card, gs.p2card);
      if (result === 'p1') gs.score.p1++;
      else if (result === 'p2') gs.score.p2++;

      // 5ラウンド消化後に勝ち数を比較して勝敗決定
      const noCards = gs.p1hand.length === 0 && gs.p2hand.length === 0;

      if (noCards) {
        gs.winner = gs.score.p1 > gs.score.p2 ? 'p1'
                  : gs.score.p2 > gs.score.p1 ? 'p2' : 'draw';
        gs.status = 'gameover';
      } else {
        gs.p1card = null;
        gs.p2card = null;
        gs.round  = (gs.round || 1) + 1;
        gs.status = 'playing';
      }
      selIdx = null;
      broadcastState();
      render();
    }, 3200);
  }
}

// P1 がカードを出す
function submitCard() {
  if (selIdx === null || !gs || gs.p1card !== null) return;
  const hand = [...gs.p1hand];
  gs.p1card = hand[selIdx];
  hand.splice(selIdx, 1);
  gs.p1hand = hand;
  selIdx = null;
  checkBothReady();
  broadcastState();
  render();
}

// P2 がカードを出す
function submitCardP2() {
  if (selIdx === null || !gs || gs.p2card !== null) return;
  send({ type: 'card', idx: selIdx });
  // 楽観的に見た目だけ更新（実際の状態更新は P1 が行う）
  selIdx = null;
  render();
}

function resetGame() {
  gs = freshState();
  selIdx = null;
  broadcastState();
  render();
}

function onPlayAgain() {
  if (myRole === 'p1') {
    resetGame();
  } else {
    send({ type: 'playAgain' });
    document.getElementById('again-btn').textContent = 'ホストのリセットを待っています…';
    document.getElementById('again-btn').disabled = true;
  }
}

// ══════════════════════════════════════════════
//  描画
// ══════════════════════════════════════════════
function render() {
  if (!gs) return;
  switch (gs.status) {
    case 'playing':   renderGame();     break;
    case 'revealing': renderReveal();   break;
    case 'gameover':  renderGameOver(); break;
  }
}

// ── ゲーム画面 ──
function renderGame() {
  showScreen('game');
  const isP1   = myRole === 'p1';
  const myHand = isP1 ? gs.p1hand : gs.p2hand;
  const opHand = isP1 ? gs.p2hand : gs.p1hand;
  const myCard = isP1 ? gs.p1card : gs.p2card;
  const opCard = isP1 ? gs.p2card : gs.p1card;

  document.getElementById('game-role-badge').innerHTML =
    `<span class="role-badge ${isP1 ? 'badge-emperor' : 'badge-slave'}">${isP1 ? '👑 皇帝側' : '⛓️ 奴隷側'}</span>`;

  document.getElementById('score-p1-name').textContent = isP1  ? '皇帝側（あなた）' : '皇帝側（相手）';
  document.getElementById('score-p2-name').textContent = !isP1 ? '奴隷側（あなた）' : '奴隷側（相手）';
  document.getElementById('score-p1-num').textContent  = gs.score.p1;
  document.getElementById('score-p2-num').textContent  = gs.score.p2;
  const round = gs.round || 1;
  document.getElementById('round-counter').innerHTML   = `${round}/<br>${TOTAL_ROUNDS}R`;

  const msg = document.getElementById('game-status-msg');
  if (myCard && !opCard)  msg.textContent = '相手のカードを待っています…';
  else if (!myCard)        msg.textContent = 'カードを選んでください';
  else                     msg.textContent = '両者のカードが揃いました';

  // 相手の手札（裏向き）
  const oppEl = document.getElementById('opp-hand');
  oppEl.innerHTML = '';
  opHand.forEach(() => {
    const el = document.createElement('div');
    el.className = 'card card-back disabled';
    if (opCard) { el.style.borderColor = '#555'; el.style.transform = 'translateY(-6px)'; }
    el.innerHTML = `<div class="card-symbol" style="font-size:22px;color:#2d4a35;">🂠</div>`;
    oppEl.appendChild(el);
  });
  document.getElementById('opp-submitted-msg').style.display = opCard ? 'block' : 'none';

  // 自分の手札
  const myEl = document.getElementById('my-hand');
  myEl.innerHTML = '';
  myHand.forEach((type, i) => {
    const info = CARD[type];
    const el   = document.createElement('div');
    el.className = `card ${info.cls}`;
    if (myCard) {
      el.classList.add('submitted');
    } else {
      if (selIdx === i) el.classList.add('selected');
      el.onclick = () => { selIdx = i; renderGame(); };
    }
    el.innerHTML = `<div class="card-symbol">${info.symbol}</div><div class="card-name">${info.name}</div>`;
    myEl.appendChild(el);
  });

  const btn = document.getElementById('submit-btn');
  btn.style.display = (selIdx !== null && !myCard) ? 'block' : 'none';
  btn.onclick = isP1 ? submitCard : submitCardP2;
}

// ── 公開画面 ──
function renderReveal() {
  showScreen('reveal');
  if (!gs.p1card || !gs.p2card) return;

  const isP1   = myRole === 'p1';
  const result = getResult(gs.p1card, gs.p2card);
  const myWin  = (isP1 && result === 'p1') || (!isP1 && result === 'p2');
  const isDraw = result === 'draw';

  document.getElementById('reveal-p1-name').textContent = isP1  ? '皇帝側（あなた）' : '皇帝側（相手）';
  document.getElementById('reveal-p2-name').textContent = !isP1 ? '奴隷側（あなた）' : '奴隷側（相手）';

  applyCard('reveal-p1-card', gs.p1card, true);
  applyCard('reveal-p2-card', gs.p2card, true);

  const resEl = document.getElementById('reveal-result');
  resEl.style.opacity = '0';
  clearTimeout(resEl._t);
  resEl._t = setTimeout(() => {
    resEl.style.opacity = '1';
    resEl.className = 'result-label pop-in ' +
      (isDraw ? 'result-draw' : myWin ? 'result-win' : 'result-lose');
    resEl.textContent = isDraw ? '引き分け' : myWin ? '勝利！' : '敗北…';
  }, 500);

  document.getElementById('reveal-next-msg').textContent = '次のラウンドへ…';
}

// ── ゲームオーバー画面 ──
function renderGameOver() {
  showScreen('gameover');
  const isP1   = myRole === 'p1';
  const w      = gs.winner;
  const myWin  = (isP1 && w === 'p1') || (!isP1 && w === 'p2');
  const isDraw = w === 'draw';

  document.getElementById('go-emoji').textContent = isDraw ? '🤝' : myWin ? '🎉' : '💀';
  const txt = document.getElementById('go-text');
  txt.textContent = isDraw ? '引き分け' : myWin ? '勝利！' : '敗北…';
  txt.style.color = isDraw ? 'var(--muted)' : myWin ? 'var(--green)' : 'var(--red)';
  document.getElementById('go-score').textContent =
    `皇帝側 ${gs.score.p1} ー ${gs.score.p2} 奴隷側`;

  const btn = document.getElementById('again-btn');
  btn.textContent = 'もう一度';
  btn.disabled    = false;
}

function applyCard(elId, type, large) {
  const info = CARD[type];
  const el   = document.getElementById(elId);
  el.className = `card ${large ? 'card-lg ' : ''}${info.cls}`;
  el.innerHTML = `<div class="card-symbol">${info.symbol}</div><div class="card-name">${info.name}</div>`;
}
</script>
</body>
</html>
